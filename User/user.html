<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="user.css">
    <title>User</title>
</head>
<body>
   <nav class = "navbar">
    <div class="logo-section">
    <img src="logo.png" alt="FoodU Logo" class="nav-logo">
</div>
    <div class="search">
      <input type="text" placeholder="Search food...">
      <button><i class="fas fa-search"></i></button>
    </div>

    <div class="profile">
      <a href="../SignUp/Signup.html"><i class="fas fa-user"></i></a>
    </div>
   </nav> 

    <main class="bento-section">
     <section class="bento hero">
         <div class="content">
    <div class="calltoaction">
        <h1>FIND YOUR PERFECT TABLE</h1>
    </div>
    
   
        <button class="book-btn">Book Now</button>

         <script>

const button1 = document.querySelector('.bento.hero button ');

           button1.addEventListener('click', () => {
        window.location.href = '../Booking/Table.html';
    });

    button1.addEventListener("mouseenter", function() {
        button1.style.transform = "scale(1.1)";
    });

    button1.addEventListener("mouseleave", function() {
        button1.style.transform = "scale(1)";         
    });
        </script>
    
    <img src="dining.png" alt="Dining Illustration" class="table-img">
</div>
     </section>
 
     <div class="right-column">
        <section class="bento right-top">
    <div class="content">
        <h2>SPECIAL OFFERS</h2> 
            <button>Explore</button>
        <script>

const button = document.querySelector('.bento.right-top button ');

           button.addEventListener('click', () => {
        window.location.href = '../Menu/menu.html';
    });

    button.addEventListener("mouseenter", function() {
        button.style.transform = "scale(1.1)";
    });

    button.addEventListener("mouseleave", function() {
        button.style.transform = "scale(1)";         
    });
        </script>
    </div>
</section>
 
         <section class="bento right-bottom">
            <div class="content">
             <h2>POPULAR CUISINES</h2>
           <a href="../Menu/menu.html">
            <button>Explore</button>
        </a>
            </div>
         </section>
     </div>
 </main>
</body>
</html>
