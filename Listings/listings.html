<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="listings.css">
    <script src="listings.js" defer></script>
    <title>Restaurants</title>
</head>
<body>

   <nav class="navbar">
        <div class="previous">
            <a href="../User/user.html" class="back-link">
                <span>Back</span>
            </a>
        </div>
        <div class="restaurant-name">
            <h2 class="name">Choose a Restaurant</h2>
        </div>
        <div class="profile">
            <span>Profile</span>
        </div>
   </nav> 

    <div class="menu-left">
        <aside class="left-sidebar">
            <button class="side-button active">Specials</button>
            <button class="side-button">Chinese</button>
            <button class="side-button">Indian</button>
            <button class="side-button">South Indian</button>
            <button class="side-button">Thai</button>
            <button class="side-button">Continental</button>
        </aside>

        <main class="menu-items" id="listings-grid">
            <div class="food-card continental">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500&q=80" alt="Mediterra" class="food-img">
                <div class="food-details">
                    <h4 class="food-name">Mediterra - Hotel Sayaji</h4>
                    <div class="food-info">
                        <span class="restaurant-cuisine">Continental</span>
                        <span class="restaurant-location">Vijay Nagar</span>
                    </div>
                </div>
            </div>

            <div class="food-card indian">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500&q=80" alt="Shreemaya" class="food-img">
                <div class="food-details">
                    <h4 class="food-name">Shreemaya Celebrity</h4>
                    <div class="food-info">
                        <span class="restaurant-cuisine">Indian</span>
                        <span class="restaurant-location">AB Road</span>
                    </div>
                </div>
            </div>

            <div class="food-card chinese">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500&q=80" alt="The Golden Wok" class="food-img">
                <div class="food-details">
                    <h4 class="food-name">The Golden Wok</h4>
                    <div class="food-info">
                        <span class="restaurant-cuisine">Chinese</span>
                        <span class="restaurant-location">New Palasia</span>
                    </div>
                </div>
            </div>

            <div class="food-card south-indian">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500&q=80" alt="Indian Coffee House" class="food-img">
                <div class="food-details">
                    <h4 class="food-name">Indian Coffee House</h4>
                    <div class="food-info">
                        <span class="restaurant-cuisine">South Indian</span>
                        <span class="restaurant-location">M G Road</span>
                    </div>
                </div>
            </div>

            <div class="food-card thai">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500&q=80" alt="The Creative Kitchen" class="food-img">
                <div class="food-details">
                    <h4 class="food-name">The Creative Kitchen</h4>
                    <div class="food-info">
                        <span class="restaurant-cuisine">Thai</span>
                        <span class="restaurant-location">Radisson Square</span>
                    </div>
                </div>
            </div>

            <div class="food-card continental">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500&q=80" alt="O2 Cafe de la Ville" class="food-img">
                <div class="food-details">
                    <h4 class="food-name">O2 Cafe de la Ville</h4>
                    <div class="food-info">
                        <span class="restaurant-cuisine">Continental</span>
                        <span class="restaurant-location">Saket Colony</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
