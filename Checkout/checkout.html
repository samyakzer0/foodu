<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="checkout.css">
    <title>Secure Checkout</title>
</head>
<body>
    <nav class="navbar">
        <div class="previous">
            <a href="../Booking/Table.html" class="back-link">
                <span><i class="fa-solid fa-angle-left"></i>Back</span>
            </a>
        </div>
        <div class="checkout-title">
            <h2>Checkout</h2>
        </div>
        <div class="profile">
            <i class="fas fa-user"></i>
        </div>
    </nav> 

    <div class="checkout-section">
        <main class="white-box">
            <div class="details">
                <h2>Reservation Details</h2>
                <div class="card">
                    <div class="restaurant-name">
                        <div class="name">
                        <h3>Restaurant</h3>
                        <p>FoodLand</p>
                    </div>
                    </div>
                    <div class="booking">
                        <div class="tablenumber">
                            <h3>Table Number</h3>
                            <p>T2</p>
                    </div>
                    <div class="deposit">
                        <div class = "amount">
                            <h3>Deposit Amount:</h3>
                            <h2>150Rs</h2>
                        </div>
                    </div>
                    </div>
                </div>
            </div>

            <div class="payment">
                <h2>Payment Details</h2>
                <div class="card">
        Details
                </div>
            </div>
        </main>
    </div>
</body>
</html>
