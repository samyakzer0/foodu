<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="checkout.css">
    <script src="checkout.js" defer></script>
    <title>Secure Checkout</title>
</head>
<body>
    <nav class="navbar">
        <div class="previous">
            <a href="../Booking/Table.html" class="back-link">
                <span><i class="fa-solid fa-angle-left"></i>Back</span>
            </a>
        </div>
        <div class="checkout-title">
            <h2>Checkout</h2>
        </div>
        <div class="profile">
            <i class="fas fa-user"></i>
        </div>
    </nav> 

    <div class="checkout-section">
        <main class="white-box">
            <div class="details">
                <h2>Reservation Details</h2>
                <div class="card summary-card">
                    <div class="detail-row">
                        <h3>Restaurant</h3>
                        <p id="summary-restaurant">FoodLand</p>
                    </div>
                    <div class="detail-row">
                        <h3>Table Number</h3>
                        <p id="summary-table">T2</p>
                    </div>

                    <div class="detail-row">
                        <h3>Time Slot</h3>
                        <p id="summary-time">6:00 PM</p>
                    </div>
        
                    <div class="detail-row amount-row">
                        <h3>Deposit Amount:</h3>
                        <h2 id="summary-deposit">150Rs</h2>
                    </div>
                </div>
            </div>

            <div class="payment">
                <h2>UPI Payment</h2>
                <div class="card payment-card">
                    <div class="qr-box">
                        <p>Scan QR with any UPI App</p>
                        <div class="qr-code">
                            <i class="fa-solid fa-qrcode"></i>
                        </div>
                    </div>
                        <span>OR</span>
                   
                    <form class="form-inputs" id="UPIForm">
                        <div class="input-group">
                            <label for="upi-id">Enter UPI ID</label>
                            <input 
                                type="text" 
                                id="upi-id" 
                                placeholder="abc@sbi" 
                                class="input-field" 
                                required >
                        </div>
                        <button type="submit" class="pay-btn">Pay & Confirm Booking</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
